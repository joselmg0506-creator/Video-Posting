sources:
  # Publish at most this many of the best NEW clips per run. Keep it small (~3) and run a
  # few times/day rather than one big batch — avoids the "mass-produced daily" pattern.
  max_per_run: 3

  # Creator hierarchy: clips from creators higher in this list are selected FIRST (top of the
  # list = highest priority), then everyone else. Matched loosely by name/handle (case- and
  # spacing-insensitive, works for both Twitch logins and YouTube channel names). Reorder to
  # change who gets clipped first; remove the list to fall back to an even source-mix.
  priority_creators:
    - kaicenat        # Kai Cenat (Twitch + @KaiCenat uploads)
    - ishowspeed      # IShowSpeed (@IShowSpeed)
    - rakai           # RaKai (matches 2xrakai / RaKai)
    - fanum
    - dukedennis
    - agent00
    - plaqueboymax
    - chrisnxtdoor
    - imdavisss
    - ray
    - tota
    - silky

  twitch:
    enabled: true
    period_days: 7            # streamers don't all stream daily, so "top of the WEEK"
                             # + dedup keeps a steady supply (1 starved the niche)
    min_views: 500
    languages: [en]          # keep only clips in these stream languages ([] = no filter)
    clips_per_broadcaster: 3   # top N clips pulled per streamer
    clips_per_game: 5          # top N clips pulled per game (streamer-agnostic)
    # MAIN NICHE: RaKai + the AMP / Streamer-University Just-Chatting / IRL crew
    # (loud reaction clips — the hook is their own reaction, so we don't narrate them).
    broadcasters:
      - 2xrakai          # RaKai (your pick) — current handle
      - rakai            # RaKai older handle (fallback)
      - kaicenat
      - dukedennis
      - fanum
      - agent00
      - plaqueboymax
      - chrisnxtdoor
      - imdavisss
      - ray
      - tota
      - silky
    # Games disabled to keep the niche tight. Re-add categories here for a gaming lane,
    # or spin up a separate channel for that once this one is proven.
    games: []

  youtube:
    enabled: false             # OFF: YouTube blocks DOWNLOADS from GitHub's datacenter IPs
                               # ("confirm you're not a bot") even with cookies — verified via
                               # yt-test. Twitch is the reliable cloud source (Kai/RaKai/AMP are
                               # all there). Re-enable only if you add a residential proxy, or
                               # for local runs where your home IP isn't blocked.
    channel_uploads_per: 2     # recent uploads pulled per channel
    tab: videos                # videos = clip from full uploads | shorts = already-vertical
    # Creators whose YouTube uploads we clip (Speed + add streamers' channels here).
    # REQUIRES cookies — set YOUTUBE_COOKIES_FILE in .env, else YouTube bot-blocks downloads.
    channels:
      - "@KaiCenat"
      - "@IShowSpeed"
    # Optional one-off video URLs.
    urls: []

  # Staged YouTube clips: download top creators' uploads on your LAPTOP (where YouTube isn't
  # bot-blocked) and push them to a 'yt-clips' Release the cloud posts from. Run on the laptop:
  #   python main.py --stage-youtube      (only stages — never posts, so no double-posting)
  # The cloud reads these automatically (public Release URLs, no auth). This is how Kai/Speed
  # YouTube content reaches the cloud despite the datacenter-IP download block.
  youtube_staged:
    enabled: true
    # (1) Creators' OWN videos — clipped at YouTube's "most replayed" peaks (the best moments),
    #     falling back to the opening window when a video has no heatmap yet.
    creators:
      - "@KaiCenat"
      - "@IShowSpeed"
    per_creator: 1                 # recent videos to mine per creator each run
    peaks_per_video: 2             # best moments to clip from each video (when heatmap exists)
    # (2) Viral curated clips via search (free, no API quota) — the already-highlighted moments.
    clip_searches:
      - "kai cenat funny clips"
      - "ishowspeed funny clips"
    per_search: 2                  # top short clips to stage per search
    keep: 14                       # max clips kept in the cloud cache (older ones pruned)
    download_cap_seconds: 600      # cap for opening-window/fallback downloads (bounds size)

processing:
  max_duration_seconds: 35   # 15-35s is the Shorts retention sweet spot (was 60)
  target_width: 1080
  target_height: 1920
  fit_mode: track      # track = smart crop that FOLLOWS the streamer's face (needs opencv) |
                       # crop = static center crop | blur_pad = full frame on blur | letterbox
  track_zoom: 0.8      # for fit_mode track: 1.0 = tightest 9:16 (subject fills frame, most zoomed
                       # in) | <1.0 = wider view around the face with blurred top/bottom (0.8 ~ 25%
                       # more scene visible). Lower = more zoomed out / more of the scene.
  peak_trim: true      # cold-open on the loudest moment instead of the clip's first seconds

# Transformative layer: AI commentary + voiceover + captions per clip.
# This is what moves the content out of YouTube's "reused/inauthentic content" and
# TikTok's "unoriginal content" demonetization buckets. Set enabled: false to revert
# to bare clip reposting (not recommended for monetization).
transform:
  enabled: true

  # Quality gate: the AI scores each clip 1-10 as a standalone Short (logged every run). With
  # quality_min > 0, clips below it are skipped BEFORE rendering — "stop posting mediocre
  # clips." Default 0 (off): watch the logged scores for a few runs, then set ~5-6 to taste.
  quality_min: 0

  # AI commentary + metadata writer (Anthropic Messages API; needs ANTHROPIC_API_KEY).
  llm:
    model: claude-haiku-4-5-20251001
    persona: "an energetic, witty hype-caster reacting to a viral streamer clip"
    max_words: 25            # short setup line, not a full read (~9s of TTS)
    use_vision: true         # let the AI WATCH a few frames for accurate titles + hype labels
    vision_frames: 4

  # Voiceover narration.
  voiceover:
    enabled: true
    backend: edge            # edge = natural neural voices, free, needs internet
                             # offline = robotic SAPI5/espeak, no internet, no key
    auto_select: true        # let the AI pick the best-fitting voice per clip from the roster
    default_voice: en-US-AndrewNeural   # fallback, and used when auto_select is false
    rate: 175                # words/min (offline backend only; edge uses natural pacing)
    duck_db: -10             # how far to lower the ORIGINAL clip audio under the voiceover

    # Voices the AI can choose from per clip (edge-tts neural voices). Keep the styles
    # distinct — matching voice to clip mood is what makes the variety feel intentional.
    roster:
      - id: en-US-AndrewNeural
        style: "warm, conversational guy — wholesome, funny, or storytime moments"
      - id: en-US-GuyNeural
        style: "high-energy hype — insane plays, clutch moments, big highlights"
      - id: en-US-BrianNeural
        style: "relaxed, sarcastic, casual — chill or comedic clips"
      - id: en-US-AvaNeural
        style: "friendly, natural woman — reactions, lifestyle, wholesome"
      - id: en-US-AriaNeural
        style: "upbeat, versatile woman — trending, pop-culture, news-y clips"

  # Burned-in word-by-word "karaoke" captions (the 2026 standard). When narrating, timed
  # to our voiceover; when not, the streamer's OWN speech is captioned via local Whisper.
  captions:
    enabled: true
    labels: false            # the mid-screen editorial hype-labels ("HE LOST IT" / "CENAT
                             # CONNECTION") on non-narrated clips. false = off (keep just the
                             # hook banner + karaoke captions).
    font_size: 72            # px at 1080x1920 (karaoke pops larger)
    hook_seconds: 4.0        # how long the hook/title banner stays on screen
    asr:
      enabled: true          # caption the streamer's own audio on non-narrated clips
      model: small           # tiny | base | small (bigger = more accurate, slower)
      language: en

  # Loop-back outro: echo the opening frame for a seamless autoplay loop (protects the
  # rewatch signal). cta_text is the small corner tag — leave "" for none. Never narrated.
  endcard:
    enabled: true
    cta_text: ""             # e.g. "SUBSCRIBE" to show a small corner tag; "" = off
    loop_seconds: 0.5        # how long to echo frame 1 at the end
    cta_font_size: 46

  # Disclose as AI-assisted on every post (YouTube containsSyntheticMedia / TikTok is_aigc).
  # Labeling has no reach/monetization penalty and avoids strikes for non-disclosure.
  ai_label: true

posting:
  enabled: true             # master switch ON — channels marked enabled will upload
  target: youtube_shorts    # youtube_shorts | tiktok

  # TikTok-only fields
  tiktok:
    privacy: SELF_ONLY      # SELF_ONLY | MUTUAL_FOLLOW_FRIENDS | PUBLIC_TO_EVERYONE
    disable_comment: false
    disable_duet: false
    disable_stitch: false

  # YouTube-Shorts-only fields
  youtube_shorts:
    privacy: private        # private | unlisted | public
    category_id: "24"       # 24 = Entertainment; see YouTube API videoCategories
    tags: [shorts, clips, fyp]

  caption_template: "{title} #Shorts"
  description_template: "{title}\nClip by {creator}\n\n#Shorts"

# ── Channels ──────────────────────────────────────────────────────────────────────────
# Each channel is a SEPARATE YouTube channel (its own OAuth token_file) fed by a producer
# chosen by content_type. The `clips` channel uses the sources/processing/transform config
# above; the AI channels carry their own producer config below. `posting.enabled` is the
# global master switch — with it false, every channel still renders but nothing uploads.
# To bring an AI channel online: create the YouTube channel, run
# `python -m src.auth_youtube` while pointed at its token_file, then set enabled: true.
channels:
  - name: clips
    content_type: clips
    enabled: true               # authorized to "Jose Mendoza" 2026-06-23; public
    target: youtube_shorts
    token_file: ./secrets/youtube_token.json        # this channel's OAuth token
    max_per_run: 3
    ai_label: false             # clips are REAL streamer footage (+ commentary) — not synthetic
                                # media, so don't set YouTube's "altered/AI content" disclosure
    youtube:
      privacy: public           # going live — scheduled clips publish publicly
      category_id: "24"         # 24 = Entertainment
      tags: [shorts, clips, fyp]

  - name: stories
    content_type: reddit_story  # original AI storytime narrated over gameplay (UnlimitedStories style)
    enabled: true               # @elmendoza1995 (El Mendoza) authorized 2026-06-23
    target: youtube_shorts
    token_file: ./secrets/youtube_token_stories.json
    max_per_run: 2
    youtube:
      privacy: public           # going live — scheduled posts publish publicly
      category_id: "24"         # 24 = Entertainment
      tags: [shorts, story, storytime, fyp, reels]
    reddit_story:
      source: original          # original (AI writes its own) | reddit (rewrite top posts)
      visual: ai_illustrated    # ai_illustrated = dense hand-drawn slideshow synced to the story
                                # | gameplay = looped gameplay b-roll (the old style)
      seconds_per_image: 3      # a fresh hand-drawn image every ~3s (image count scales with length)
      target_seconds: 45        # narration length (kept short/punchy for Shorts)
      # Narrator voices split by gender so the voice MATCHES the kid telling the story.
      # The AI tags each first-person story's narrator boy/girl; a random voice from that
      # pool is used (so a boy's story gets a boy voice, a girl's gets a girl voice).
      voices_girl:
        - en-US-AnaNeural       # young girl
        - en-US-JennyNeural     # friendly girl/young woman
        - en-US-AriaNeural      # upbeat girl/young woman
      voices_boy:
        - en-US-GuyNeural       # energetic boy/young guy
        - en-US-BrianNeural     # casual boy/young guy
        - en-US-EricNeural      # calm boy/young guy
      voice: en-US-AnaNeural    # fallback
      # Who the stories are for — steers tone, vocabulary, and setting.
      audience: "elementary and middle-school kids (ages 8-13)"
      # Clean gameplay loops go here (Subway Surfers / Minecraft parkour / GTA / mobile games).
      # NOT ./data/broll (that's World Cup footage for music-edit).
      broll_dir: ./data/broll_gameplay
      # Story seeds — CATCHY school-kid stories (bullies, friendships, recess drama, karma)
      # with a hook and a satisfying twist. The AI writes a fresh original story each run.
      themes:
        - "the new kid stood up to the school bully and nobody saw it coming"
        - "I got revenge on the bully who stole my lunch every single day"
        - "my best friend started acting like a bully, until karma caught up"
        - "the quiet kid everyone picked on had an amazing secret talent"
        - "the bully picked the wrong kid to mess with at recess"
        - "nobody believed what really happened on the class field trip"
        - "the popular kid wasn't who everyone thought they were"
        - "I found a mysterious note in my locker that changed my whole year"
        - "the substitute teacher caught the bully red-handed in front of everyone"
        - "the smallest kid in class became the school hero in one day"
        - "I traded lunches with the new girl and it changed everything"
        - "the kid who always got blamed finally proved the truth"
        # — funny bathroom-emergency comedy (silly, clean — Captain-Underpants vibe) —
        - "the kid who ALWAYS needed the bathroom at the worst possible moment"
        - "I had to poop SO bad during the biggest test of the whole year"
        - "the legendary bathroom emergency that somehow saved our field trip"
        - "my stomach growled so loud during quiet time the entire class lost it"
        - "the great bathroom race when only ONE stall in the school worked"
        - "the new kid set the record for most bathroom trips in a single day"
        - "I ate the mystery cafeteria taco and learned my lesson the hard way"
        - "the day my tummy rumble became a legend at summer camp"
  # (For per-scene Flux ILLUSTRATED stories set visual: ai_illustrated; for the cinematic
  #  animated film version, set content_type: story_film — that producer still ships.)

  - name: characters
    content_type: brainrot_movie   # Italian-brainrot picture-stories (stills by default)
    enabled: true                  # authorized to "Jose Mendoza" 2026-06-23; public
    target: youtube_shorts
    token_file: ./secrets/youtube_token_characters.json
    max_per_run: 1
    youtube:
      privacy: public           # going live — scheduled posts publish publicly
      category_id: "24"
      tags: [shorts, brainrot, italianbrainrot, ai, meme, fyp]
    brainrot_movie:
      animate: false            # false = cheap dramatic STILLS (~$0.02, each picture matches its
                                # line) | true = fal image-to-video animated clips (~$0.10-0.40)
      scenes: 5                 # scenes/pictures per story (each shown for the length of its line)
      image_model: fal-ai/flux/schnell
      # --- only used when animate: true ---
      num_frames: 97            # frames per animated clip (~4s at 24fps); 8*n+1
      video_model: fal-ai/ltx-video-13b-distilled/image-to-video   # budget image-to-video
      # Characters speak in distinct Italian-accented voices (it-IT, assigned per character).
    # (The single-character intro producer still ships — set content_type: ai_character.)

# Beat-synced music edit (separate mode): `python main.py --music-edit`.
# A song over b-roll cut on the beat (e.g. Speed's World Cup song over WC moments + his
# own footage). Note: FIFA footage + the song are rights-managed — for-fun / unlisted.
music_edit:
  song_url: "https://www.youtube.com/watch?v=vrY1THC_NQE"    # Speed - World Cup (Champions)
  broll_urls:
    - "https://www.youtube.com/watch?v=phCws4VKPyY"          # Most Iconic World Cup Moments
    - "https://www.youtube.com/watch?v=8C3we1FSAA0"          # Iconic FIFA WC Moments Part 1
    - "https://www.youtube.com/watch?v=_RD6s35qC4g"          # Iconic FIFA WC Moments Part 2
  duration: 30           # length of the edit (s)
  song_start: auto       # auto = highest-energy section (skips the intro) | a number (seconds)
  beats_per_cut: 1       # cut every N beats (1 = on every beat)
  fit: blur_pad          # blur_pad = whole frame visible (soccer not cropped) | crop | letterbox
  hook_text: ""          # optional top banner, e.g. "WORLD CUP"
  broll_max_seconds: 240 # only download the first N seconds of each b-roll
  broll_dir: ./data/broll

notifications:
  discord:
    enabled: true        # post / failure / daily-metrics alerts (needs DISCORD_WEBHOOK_URL)

paths:
  downloads: ./data/downloads
  processed: ./data/processed
  state: ./data/state.json
  # Auto-delete LOCAL downloaded + rendered .mp4 files older than this many days, at the start
  # of each run, to free disk. 0 = keep everything forever. This NEVER touches YouTube uploads,
  # the dedup state, or source assets (b-roll / gameplay / music) — only the transient local
  # copies in downloads/ and processed/ (YouTube already has the posted videos).
  keep_media_days: 3
