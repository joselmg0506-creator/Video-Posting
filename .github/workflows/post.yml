name: post-shorts

# Runs the pipeline in GitHub's cloud on a schedule, so it posts with your laptop off.
# See DEPLOY.md for one-time setup (publish the OAuth app, push secrets, upload gameplay).

on:
  schedule:
    # 3x/day, tuned for a TEXAS (US Central) audience. GitHub cron is always in UTC and does
    # NOT follow daylight saving, so these are pinned to Central DAYLIGHT time (CDT, Mar–Nov).
    # During winter (CST, Nov–Mar) every slot lands one hour earlier — still fine.
    - cron: '0 17 * * *'   # 12:00 PM CT (11:00 AM in winter) — school-lunch phone window
    - cron: '0 20 * * *'   # 3:00 PM  CT  (2:00 PM in winter) — after-school
    - cron: '0 1  * * *'   # 8:00 PM  CT  (7:00 PM in winter) — evening prime time
  workflow_dispatch: {}    # manual "Run workflow" button in the Actions tab (for testing)

permissions:
  contents: write          # to commit data/state.json back (dedup persistence)

concurrency:
  group: post-shorts       # never let two runs overlap (they'd race on state.json)
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Cache models (Whisper + YuNet)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            data/models
          key: models-v1

      - name: Cache gameplay b-roll
        id: gp
        uses: actions/cache@v4
        with:
          path: data/broll_gameplay
          key: gameplay-v1

      - name: Download gameplay from release (on cache miss)
        if: steps.gp.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/broll_gameplay
          gh release download assets -p '*.mp4' -D data/broll_gameplay --clobber \
            || echo "No 'assets' release yet — the stories channel will skip until you upload gameplay (see DEPLOY.md)."

      - name: Restore secrets (.env + secrets/)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          SECRETS_TAR_B64: ${{ secrets.SECRETS_TAR_B64 }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          printf '%s' "$SECRETS_TAR_B64" | base64 -d > /tmp/secrets.tgz
          tar xzf /tmp/secrets.tgz
          rm -f /tmp/secrets.tgz

      - name: Run pipeline (all enabled channels, 1 post each)
        run: python main.py --max-per-run 1

      - name: Persist dedup state
        run: |
          if [ -n "$(git status --porcelain data/state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "state: posted records [skip ci]"
            # rebase-then-push with retries so a concurrent push (e.g. the pages/metrics
            # workflow, or a manual run) can never drop the dedup record -> no duplicate posts.
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash && git push && break
              echo "state push retry $i"; sleep 4
            done
          else
            echo "no state change"
          fi
