name: yt-test

# One-off diagnostic: can we list + DOWNLOAD a YouTube clip from GitHub's cloud (where the
# datacenter-IP bot-check bites)? No posting. Trigger manually from the Actions tab.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Restore secrets (.env + cookies)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          SECRETS_TAR_B64: ${{ secrets.SECRETS_TAR_B64 }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          printf '%s' "$SECRETS_TAR_B64" | base64 -d > /tmp/s.tgz
          tar xzf /tmp/s.tgz && rm -f /tmp/s.tgz
      - name: Try YouTube list + download
        run: |
          python - <<'PY'
          from pathlib import Path
          from src.sources.youtube import recent_uploads, download
          Path("data/downloads").mkdir(parents=True, exist_ok=True)
          ok = False
          for handle in ["@IShowSpeed", "@KaiCenat"]:
              try:
                  clips = recent_uploads(handle, limit=2, tab="videos")
                  print(f"{handle}: listed {len(clips)} uploads")
                  if clips:
                      c = clips[0]
                      print(f"  downloading: {c.title!r}")
                      p = download(c, Path("data/downloads"))
                      sz = p.stat().st_size if p.exists() else 0
                      print(f"  RESULT: {p.name} ({sz/1e6:.1f} MB)")
                      ok = ok or sz > 0
              except Exception as e:
                  print(f"  {handle} FAILED: {type(e).__name__}: {str(e)[:220]}")
          print("\nOVERALL:", "YOUTUBE WORKS IN CLOUD ✅" if ok else "YOUTUBE STILL BLOCKED ❌")
          PY
