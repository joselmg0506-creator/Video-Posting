name: metrics

# Daily analytics digest to Discord (same as the local 10pm task). Read-only.

on:
  schedule:
    - cron: '0 3 * * *'    # 10:00 PM CT nightly recap (UTC; shifts to 9 PM in winter)
  workflow_dispatch: {}

permissions:
  contents: write          # commit data/suggestions.json (daily competitor-aware tips) back

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Restore secrets (.env + secrets/)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          SECRETS_TAR_B64: ${{ secrets.SECRETS_TAR_B64 }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          printf '%s' "$SECRETS_TAR_B64" | base64 -d > /tmp/secrets.tgz
          tar xzf /tmp/secrets.tgz
          rm -f /tmp/secrets.tgz
      - name: Post metrics digest
        run: python main.py --metrics

      - name: Generate competitor-aware dashboard tips
        run: python main.py --suggestions || echo "suggestions step failed (non-fatal)"

      - name: Snapshot view counts (daily trends)
        run: python main.py --snapshot || echo "snapshot step failed (non-fatal)"

      - name: Persist suggestions + history
        run: |
          git add data/suggestions.json data/history.json
          if [ -n "$(git status --porcelain data/suggestions.json data/history.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "data: refresh competitor tips + view snapshot [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "retry $i"; sleep 3
            done
          else
            echo "no data change"
          fi
